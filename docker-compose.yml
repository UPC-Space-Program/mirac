services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mirac_user
      POSTGRES_PASSWORD: mirac_password
      POSTGRES_DB: mirac_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://mirac_user:mirac_password@db:5432/mirac_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./AIGUA_DEPURADORES.gml:/app/AIGUA_DEPURADORES.gml

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot

volumes:
  postgres_data:
